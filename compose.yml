# ==============================================================================
# Silvasonic Compose Configuration
# Podman-only (see ADR-0004, ADR-0013)
# ==============================================================================

services:
  # --- Gateway (Caddy) ---
  # Tier 1 - Unified Entry Point for all web services
  gateway:
    container_name: silvasonic-gateway
    image: docker.io/library/caddy:2-alpine
    restart: unless-stopped
    env_file: .env
    ports:
      - "${SILVASONIC_GATEWAY_HTTP_PORT:-80}:80"
      - "${SILVASONIC_GATEWAY_HTTPS_PORT:-443}:443"
    volumes:
      - ./services/gateway/Caddyfile:/etc/caddy/Caddyfile:ro,z
      - caddy_data:/data
      - caddy_config:/config
      - ${SILVASONIC_WORKSPACE_PATH}/gateway/logs:/var/log/caddy:z
    networks:
      - silvasonic-net
    depends_on:
      web-mock:
        condition: service_healthy

  # --- Database (TimescaleDB) ---
  database:
    container_name: silvasonic-database
    build:
      context: .
      dockerfile: services/database/Containerfile
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-silvasonic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-silvasonic}
      POSTGRES_DB: ${POSTGRES_DB:-silvasonic}
    ports:
      - "${SILVASONIC_DB_PORT:-5432}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - silvasonic-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-silvasonic}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Controller (API / Orchestration) ---
  controller:
    container_name: silvasonic-controller
    build:
      context: .
      dockerfile: services/controller/Containerfile
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: database
      SILVASONIC_CONTAINER_SOCKET: /var/run/container.sock
      SILVASONIC_NETWORK: silvasonic-net
      SILVASONIC_RECORDER_WORKSPACE_LOCAL: /app/recorder-workspace
      SILVASONIC_REDIS_URL: redis://redis:6379/0
    ports:
      - "${SILVASONIC_CONTROLLER_PORT:-9100}:9100"
    volumes:
      - ${SILVASONIC_WORKSPACE_PATH}/controller:/app/workspace:z
      - ${SILVASONIC_WORKSPACE_PATH}/recorder:/app/recorder-workspace:z
      - ${SILVASONIC_PODMAN_SOCKET}:/var/run/container.sock:z
      - ./services/controller/config:/app/config:ro,z  # Factory defaults + microphone profiles
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - silvasonic-net
    # Hardware access (same privilege level as recorder for consistency)
    privileged: true
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9100/healthy" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # --- Processor (Data Ingestion & Storage Retention) ---
  # Tier 1 — Immutable Container pattern (ADR-0019).
  # Config read from system_config on startup; restart to reconfigure.
  processor:
    container_name: silvasonic-processor
    build:
      context: .
      dockerfile: services/processor/Containerfile
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: database
      SILVASONIC_REDIS_URL: redis://redis:6379/0
    ports:
      - "${SILVASONIC_PROCESSOR_PORT:-9200}:9200"
    volumes:
      # Recorder workspace: RW — Processor is the ONLY non-Recorder service
      # with write access (Janitor delete authority, ADR-0009).
      - ${SILVASONIC_WORKSPACE_PATH}/recorder:/data/recorder:z
      # Processor workspace: RW — own workspace for internal state.
      - ${SILVASONIC_WORKSPACE_PATH}/processor:/data/processor:z
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      controller:
        condition: service_healthy
    networks:
      - silvasonic-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9200/healthy" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # --- Recorder (Audio Capture) ---
  # Immutable Tier 2 service. Managed by Controller via podman-py, NOT auto-started.
  # Multiple instances may run concurrently. No database access. No host ports.
  # This profile serves as documentation/template only (see ADR-0013).
  # Resource limits are enforced at runtime by the Controller (see ADR-0020).
  recorder:
    build:
      context: .
      dockerfile: services/recorder/Containerfile
    restart: unless-stopped
    profiles: [ "managed" ]
    # No host port exposure — Controller reaches Recorder via container-internal IP.
    # Health endpoint (port 9500) is accessible within silvasonic-net only.
    volumes:
      - ${SILVASONIC_WORKSPACE_PATH}/recorder:/app/workspace:z
    networks:
      - silvasonic-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9500/healthy" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Hardware access (audio devices, GPIO)
    privileged: true
    devices:
      - /dev/snd:/dev/snd
    group_add:
      - audio
    # Resource Limits & QoS (ADR-0020) — template values, enforced by Controller at runtime
    mem_limit: 512m
    cpus: 1.0
    oom_score_adj: -999 # Protected: OOM Killer kills this LAST

  # --- BirdNET (Inference Worker) ---
  # Tier 2 background worker. Controlled via runtime profiles.
  birdnet:
    build:
      context: .
      dockerfile: services/birdnet/Containerfile
    restart: unless-stopped
    profiles: [ "managed" ]
    networks:
      - silvasonic-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9500/healthy" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Resource Limits & QoS (Template)
    mem_limit: 1024m
    cpus: 1.5

  # --- Redis (Pub/Sub broker for heartbeats and SSE log streaming) ---
  # Ephemeral — no persistence required (status bus, see ADR-0017, ADR-0019, ADR-0022).
  # Named volume used for bind-mount consistency (ADR-0006).
  redis:
    container_name: silvasonic-redis
    image: docker.io/library/redis:7-alpine
    restart: unless-stopped
    # Disable persistence — all Redis data (heartbeats, status) is volatile by design.
    command: [ "redis-server", "--save", "" ]
    ports:
      - "${SILVASONIC_REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - silvasonic-net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Web-Mock (Tier 1 Dev UI — v0.2.0) ---
  # Full UI shell with mock data for most views. Uses real DB for Settings
  # persistence and Redis for heartbeat. Clone → web-interface at v0.9.0.
  web-mock:
    container_name: silvasonic-web-mock
    build:
      context: .
      dockerfile: services/web-mock/Containerfile
    restart: unless-stopped
    env_file: .env
    environment:
      SILVASONIC_REDIS_URL: redis://redis:6379/0
      POSTGRES_HOST: database
      POSTGRES_USER: ${POSTGRES_USER:-silvasonic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-silvasonic}
      POSTGRES_DB: ${POSTGRES_DB:-silvasonic}
      SILVASONIC_API_ROOT_PATH: /web-mock
    ports:
      - "${SILVASONIC_WEB_MOCK_PORT:-8001}:8001"
    depends_on:
      redis:
        condition: service_healthy
      database:
        condition: service_healthy
    networks:
      - silvasonic-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8001/healthy" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # --- DB-Viewer (Tier 1 Dev UI — v0.7.1) ---
  # Minimal read-only database viewer for development.
  db-viewer:
    container_name: silvasonic-db-viewer
    profiles: ["db-viewer"]
    build:
      context: .
      dockerfile: services/db-viewer/Containerfile
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: database
      POSTGRES_USER: ${POSTGRES_USER:-silvasonic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-silvasonic}
      POSTGRES_DB: ${POSTGRES_DB:-silvasonic}
      SILVASONIC_API_ROOT_PATH: /db-viewer
    depends_on:
      database:
        condition: service_healthy
    networks:
      - silvasonic-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8002/" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

# --- Volumes (Named volumes only for stateful services, per ADR-0006) ---
volumes:
  db-data:
  redis-data:
  caddy_data:
  caddy_config:

    # --- Networks ---
networks:
  silvasonic-net:
    driver: bridge
    # Explicit name prevents Compose project-prefix ambiguity (e.g. "myproject_silvasonic-net").
    # Controller uses SILVASONIC_NETWORK env var to join Tier 2 containers to this network.
    name: silvasonic-net
