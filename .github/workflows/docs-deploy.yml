name: Deploy Custom Docs
on:
  push:
    branches:
      - main
    paths:
      - docs/**
      - mkdocs.yml
      - README.md
      - VISION.md
      - ROADMAP.md
      - AGENTS.md
      - .github/workflows/docs-deploy.yml

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Deploy MkDocs to GitHub Pages
        run: uv run mkdocs gh-deploy --force
