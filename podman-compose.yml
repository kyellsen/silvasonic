  #     container_name: silvasonic-batdetect
  #     entrypoint: [/bin/true]
  #     restart: "no"
  #     userns_mode: keep-id
  #     networks: [silvasonic-net]
  uploader:
    image: silvasonic-uploader
    build:
      context: .
      dockerfile: services/uploader/Dockerfile
    container_name: silvasonic-uploader
    entrypoint: [/bin/true]
    restart: 'no'
    userns_mode: keep-id
    environment:
      LOG_DIR: /var/log/silvasonic
    volumes:
      # Governance: Buffer (RW)
      - ${SILVASONIC_WORKSPACE_PATH:-./workspace}/uploader/buffer:/data/uploader/buffer:z
      # Governance: Logs (RW)
      - ${SILVASONIC_WORKSPACE_PATH:-./workspace}/uploader/logs:/var/log/silvasonic:z
      # Governance: Source Data (RO) - Access to recorder artifacts
      - ${SILVASONIC_WORKSPACE_PATH:-./workspace}/recorder:/data/recorder:ro,z
    networks: [silvasonic-net]
networks:
  silvasonic-net:
    driver: bridge
