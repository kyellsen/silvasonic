---
version: '3.8'
services:
  database:
    image: silvasonic-database
    build:
      context: services/database
      dockerfile: Dockerfile
    container_name: silvasonic-database
    restart: always
    userns_mode: keep-id
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-silvasonic}
    volumes:
      - ${SILVASONIC_WORKSPACE_PATH:-./workspace}/database:/var/lib/postgresql/data:z
    networks: [silvasonic-net]
    shm_size: 512mb  # Matches shared_buffers recommendation
    healthcheck:
      test: [CMD-SHELL, pg_isready -U postgres]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:alpine
    container_name: silvasonic-redis
    restart: always
    userns_mode: keep-id
    volumes:
      - ./services/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro,z
      - ${SILVASONIC_WORKSPACE_PATH:-./workspace}/redis:/data:z
    command: [redis-server, /usr/local/etc/redis/redis.conf]
    networks: [silvasonic-net]
    healthcheck:
      test: [CMD, redis-cli, ping]
      interval: 5s
      timeout: 3s
      retries: 5
  controller:
    image: silvasonic-controller
    build:
      context: .
      dockerfile: services/controller/Dockerfile
    container_name: silvasonic-controller
    restart: always
    userns_mode: keep-id
    environment:
      PODMAN_SOCKET_URL: unix:///run/podman/podman.sock
      HOST_DATA_DIR: ${SILVASONIC_WORKSPACE_PATH:-./workspace}
      POSTGRES_HOST: database
      REDIS_HOST: redis
      HOST_SOURCE_DIR: ${PWD}  # Root of the repository on the host
    volumes:
      - /run/user/1000/podman/podman.sock:/run/podman/podman.sock:rw,z
      # Mount workspace/controller/logs -> /var/log/silvasonic/controller ??
      # Governance says: "logs/" in service folder.
      # Service writes to: stdout (structlog) usually, but we can configure file logger too.
      # For now, let's just mount the socket.
      - ./services/recorder/config/profiles:/etc/silvasonic/profiles:ro,z  # Ensure controller has access to verify profiles logic? No, orchestrator mounts HOST path.
    security_opt: [label=disable]
    networks: [silvasonic-net]
    devices:
      - /dev/snd:/dev/snd  # Required for hardware scanning (hardware.py)
    depends_on: [redis, database]
  gateway:
    image: silvasonic-gateway
    build:
      context: services/gateway
      dockerfile: Dockerfile
    container_name: silvasonic-gateway
    restart: always
    user: 1000:1000
    userns_mode: keep-id
    ports: [80:8080, 443:8443]
    environment:
      DOMAIN_NAME: ${DOMAIN_NAME:-localhost}
    volumes:
      - ${SILVASONIC_WORKSPACE_PATH:-./workspace}/gateway/logs:/var/log/caddy:z
      - ${SILVASONIC_WORKSPACE_PATH:-./workspace}/gateway/data:/data:z
      - ${SILVASONIC_WORKSPACE_PATH:-./workspace}/gateway/config:/config:z
    networks: [silvasonic-net]
    depends_on: [redis, database]
  status-board:
    image: silvasonic-status-board
    build:
      context: .
      dockerfile: services/status-board/Dockerfile
    container_name: silvasonic-status-board
    restart: 'no'
    userns_mode: keep-id
    volumes: ['/run/user/1000/podman/podman.sock:/run/podman/podman.sock:rw,z']
    security_opt: [label=disable]
    ports: [8001:8000]
    environment:
      DEV_MODE: 'true'
      POSTGRES_HOST: database
      REDIS_HOST: redis
    networks: [silvasonic-net]
    depends_on: [redis, database]
  recorder:
    image: silvasonic-recorder
    build:
      context: .
      dockerfile: services/recorder/Dockerfile
    container_name: silvasonic-recorder
    # Template only - do not start automatically
    # profiles: ["manual"]
    restart: 'no'
    userns_mode: keep-id
    devices: [/dev/snd:/dev/snd]
    ports: [8002:8000]
    environment:
      MIC_NAME: default
      MIC_PROFILE: ultramic_384_evo
      ALSA_DEVICE_INDEX: '' # Auto-detect or set specific index
    volumes:
      - ./services/recorder/config/profiles:/etc/silvasonic/profiles:ro,z
      - ${SILVASONIC_WORKSPACE_PATH:-./workspace}/recorder:/data/recorder:z
    networks: [silvasonic-net]
    depends_on: [database]
networks:
  silvasonic-net:
    driver: bridge
