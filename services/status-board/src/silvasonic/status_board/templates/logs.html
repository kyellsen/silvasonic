<div class="flex-1 flex flex-col overflow-hidden bg-gray-900"
     id="log-viewer">
  <!-- Toolbar -->
  <div class="h-10 bg-gray-800 border-b border-gray-700 flex items-center px-4 justify-between shrink-0">
    <div class="flex items-center space-x-2">
      <button hx-get="/dashboard"
              hx-target="#main-view"
              class="text-gray-400 hover:text-white mr-2">
        ←
        Back
      </button>
      <span class="text-xs text-gray-400">Viewing Logs:</span>
      <span class="text-sm font-mono text-emerald-400 text-ellipsis overflow-hidden whitespace-nowrap max-w-[200px]">{{
      container_id }}</span>
    </div>
    <div class="flex items-center space-x-2">
      <span class="text-[10px] uppercase text-emerald-500 font-bold animate-pulse">Live</span>
    </div>
  </div>
  <!-- Terminal -->
  <div class="flex-1 overflow-auto bg-[#0d1117] p-4 font-mono text-xs leading-5 text-gray-300 relative"
       id="terminal-container">
    <div id="terminal-output" class="whitespace-pre-wrap"></div>
    <script>
            {
                const containerId = "{{ container_id }}";
                const outputDiv = document.getElementById("terminal-output");
                const containerDiv = document.getElementById("terminal-container");
                let eventSource;

                function connect() {
                    console.log("Connecting to log stream...");
                    eventSource = new EventSource("/stream/" + containerId);

                    eventSource.onmessage = function (event) {
                        const div = document.createElement("div");
                        div.textContent = event.data; // Safe text
                        outputDiv.appendChild(div);

                        // Auto-scroll if near bottom
                        if (containerDiv.scrollHeight - containerDiv.scrollTop - containerDiv.clientHeight < 100) {
                            containerDiv.scrollTop = containerDiv.scrollHeight;
                        }
                    };

                    eventSource.onerror = function () {
                        console.error("Stream failed.");
                        eventSource.close();
                        const err = document.createElement("div");
                        err.className = "text-red-500 font-bold";
                        err.textContent = "\n[Stream Connection Lost]";
                        outputDiv.appendChild(err);
                    };
                }

                connect();

                // Cleanup on HTMX swap (when this element is removed)
                document.body.addEventListener('htmx:beforeSwap', function (evt) {
                    if (evt.target.id === "main-view" && eventSource) {
                        console.log("Closing stream due to navigation");
                        eventSource.close();
                    }
                });
            }
    </script>
  </div>
</div>
