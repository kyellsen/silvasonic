<div class="px-6 py-4 border-b border-base-200 bg-base-100 flex items-center justify-between">
  <div>
    <div class="text-xs font-bold uppercase tracking-wider opacity-60 mb-1">Service Detail</div>
    <h1 class="text-2xl font-bold flex items-center gap-3">
      {{ service_name | title }}
      {% if container %}
        <div class="badge badge-success gap-2">
          <span class="w-1.5 h-1.5 rounded-full bg-white"></span>
          Running
        </div>
      {% else %}
        <div class="badge badge-error gap-2">
          <span class="w-1.5 h-1.5 rounded-full bg-white"></span>
          Stopped
        </div>
      {% endif %}
    </h1>
  </div>
  <div class="flex items-center gap-3">
    {% if container %}
      <div class="flex flex-col items-end">
        <div class="text-xs opacity-50 uppercase tracking-wider">Container ID</div>
        <div class="font-mono text-sm">{{ container.Id[:12] }}</div>
      </div>
    {% endif %}
    <a href="/services/{{ service_name }}/logs"
       class="btn btn-sm btn-ghost gap-2">
      <svg xmlns="http://www.w3.org/2000/svg"
           class="h-4 w-4"
           fill="none"
           viewBox="0 0 24 24"
           stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
      </svg>
      Logs
    </a>
  </div>
</div>
