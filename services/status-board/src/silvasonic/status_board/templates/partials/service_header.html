<!-- Tabs (Contextual, Server-Side) -->
<div class="tabs tabs-lifted pt-2 px-4 bg-base-200/50 border-b border-base-200 shrink-0">
  <a class="tab {{ 'tab-active [--tab-bg:theme(colors.base-300) ]' if active_tab == 'overview' else '' }}"
     hx-get="/services/{{ service_name }}"
     hx-target="#main-view"
     hx-trigger="click">Overview</a>
  <a class="tab {{ 'tab-active [--tab-bg:theme(colors.base-300) ]' if active_tab == 'logs' else '' }}"
     hx-get="/services/{{ service_name }}/logs"
     hx-target="#main-view"
     hx-trigger="click">Logs</a>
  <a class="tab flex-1 cursor-default pointer-events-none"></a>
</div>
<!-- Header -->
<div class="bg-base-200/50 backdrop-blur-sm border-b border-base-300 px-6 py-4 shrink-0 flex items-center justify-between">
  <div>
    <h2 class="text-xl font-bold font-heading text-primary capitalize">{{ service_name }}</h2>
    <div class="badge badge-ghost badge-sm font-mono opacity-70 mt-1">ID: {{ container_id[:12] }}</div>
  </div>
  <div class="badge badge-success gap-2">
    <span class="w-2 h-2 rounded-full bg-white animate-pulse"></span>
    Running
  </div>
</div>
