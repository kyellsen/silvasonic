<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-900 text-gray-100">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silvasonic Dev Status</title>
    <!-- Using Tailwind via CDN for provisional tool speed -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <!-- Alpine.js -->
    <script defer
            src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
    /* Custom scrollbar for IDE feel */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #1f2937;
    }

    ::-webkit-scrollbar-thumb {
      background: #4b5563;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #6b7280;
    }
    </style>
  </head>
  <body class="h-full flex flex-col overflow-hidden font-mono text-sm">
    <!-- Top Bar -->
    <header class="h-10 bg-gray-800 border-b border-gray-700 flex items-center px-4 justify-between shrink-0">
      <div class="flex items-center space-x-2">
        <span class="text-emerald-400 font-bold">⚡ Silvasonic Status Board</span>
        <span class="text-xs text-gray-500 px-2 border border-gray-600 rounded">DEV_MODE</span>
      </div>
      <div class="text-xs text-gray-400"
           hx-get="/health"
           hx-trigger="load, every 10s">Checking status...</div>
    </header>
    <!-- Main Workspace -->
    <div class="flex-1 flex overflow-hidden">
      <!-- Sidebar -->
      <aside class="w-64 bg-gray-800 border-r border-gray-700 flex flex-col shrink-0">
        <div class="p-2 text-xs font-semibold text-gray-400 uppercase tracking-wider">Services</div>
        <nav class="flex-1 overflow-y-auto p-2 space-y-1">
          <a href="#"
             hx-get="/dashboard"
             hx-target="#main-view"
             class="block px-3 py-2 rounded bg-gray-700 text-white hover:bg-gray-600 transition-colors">Dashboard</a>
          <a href="#"
             class="block px-3 py-2 rounded hover:bg-gray-700 text-gray-300 cursor-not-allowed opacity-50">Database</a>
          <a href="#"
             class="block px-3 py-2 rounded hover:bg-gray-700 text-gray-300 cursor-not-allowed opacity-50">Redis</a>
          <a href="#"
             class="block px-3 py-2 rounded hover:bg-gray-700 text-gray-300 cursor-not-allowed opacity-50">Gateway</a>
          <a href="#"
             class="block px-3 py-2 rounded hover:bg-gray-700 text-gray-300 cursor-not-allowed opacity-50">Logs</a>
        </nav>
      </aside>
      <!-- Content Area -->
      <main class="flex-1 flex flex-col bg-gray-900 overflow-hidden relative">
        <!-- Tabs -->
        <div class="h-9 bg-gray-800 flex items-center px-2 space-x-1 border-b border-gray-700 shrink-0">
          <div class="px-3 py-1 bg-gray-900 border-t-2 border-emerald-500 text-gray-200 text-xs rounded-t">Overview</div>
          <div class="px-3 py-1 hover:bg-gray-700 text-gray-400 text-xs rounded-t cursor-pointer">metrics.sql</div>
        </div>
        <!-- Panel -->
        <div class="flex-1 overflow-auto p-6"
             id="main-view"
             hx-get="/dashboard"
             hx-trigger="load">
          <!-- Content loaded via HTMX -->
          <div class="flex items-center justify-center h-full text-gray-500">Loading Status Board...</div>
        </div>
      </main>
    </div>
    <!-- Status Bar -->
    <footer class="h-6 bg-emerald-900 text-white text-xs flex items-center px-4 justify-between shrink-0">
      <div>Ready</div>
      <div>UTF-8</div>
    </footer>
  </body>
</html>
