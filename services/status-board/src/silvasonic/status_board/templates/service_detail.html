<div class="flex-1 flex flex-col h-full overflow-hidden">
  {% set active_tab = "overview" %}
  {% include "partials/service_header.html" with context %}
  <!-- Status Content (Bento Grid) -->
  <div class="flex-1 overflow-auto p-6">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 auto-rows-fr">
      <!-- Health Card (Large) -->
      <div class="md:col-span-2 row-span-2 card bg-base-100 shadow-xl border border-base-200">
        <div class="card-body">
          <div class="flex items-start justify-between">
            <div>
              <h3 class="text-xs font-bold uppercase tracking-wider opacity-60">Health Score</h3>
              <div class="text-5xl font-bold text-success mt-2">98.5%</div>
            </div>
            <div class="p-3 bg-success/10 rounded-xl text-success">
              <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
              </svg>
            </div>
          </div>
          <div class="text-sm opacity-70 mt-4">System performing optimally. All checks passing.</div>
          <!-- decorative chart line -->
          <progress class="progress progress-success w-full mt-6" value="98.5" max="100"></progress>
        </div>
      </div>
      <!-- Stats Card 1: Uptime -->
      <div class="stats shadow bg-base-100 border border-base-200">
        <div class="stat">
          <div class="stat-title text-xs font-bold uppercase tracking-wider opacity-60">Uptime</div>
          <div class="stat-value text-2xl">12d 4h</div>
          <div class="stat-desc text-success">↗︎ 2% more than last week</div>
        </div>
      </div>
      <!-- Stats Card 2: Memory -->
      <div class="stats shadow bg-base-100 border border-base-200">
        <div class="stat">
          <div class="stat-title text-xs font-bold uppercase tracking-wider opacity-60">Memory</div>
          <div class="stat-value text-2xl text-info">45MB</div>
          <div class="stat-desc">12% of allocated</div>
        </div>
      </div>
      <!-- Stats Card 3: CPU -->
      <div class="stats shadow bg-base-100 border border-base-200">
        <div class="stat">
          <div class="stat-title text-xs font-bold uppercase tracking-wider opacity-60">CPU Load</div>
          <div class="stat-value text-2xl text-secondary">0.2%</div>
          <div class="stat-desc">Idle</div>
        </div>
      </div>
    </div>
    <div class="mt-6 p-8 rounded-xl border border-dashed border-base-300 flex flex-col items-center justify-center text-base-content/40 text-sm gap-2">
      <svg xmlns="http://www.w3.org/2000/svg"
           class="h-8 w-8 opacity-50"
           fill="none"
           viewBox="0 0 24 24"
           stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.384-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
      </svg>
      <span>Live metrics stream coming soon...</span>
    </div>
  </div>
</div>
