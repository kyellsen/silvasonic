# postgresql.conf - Silvasonic Optimized Configuration
# Target Hardware: Raspberry Pi 5 with NVMe Storage

# ------------------------------------------------------------------------------
# CONNECTION & RESOURCES
# ------------------------------------------------------------------------------
listen_addresses = '*'
max_connections = 100                   # Standard for asyncpg clients

# Memory (Assuming 4GB/8GB Pi, allocating modest amount to DB)
shared_buffers = 512MB                  # ~12% or 4GB RAM (as per Architecture Doc)
work_mem = 16MB                         # Per operation memory
maintenance_work_mem = 128MB            # For maintenance tasks like VACUUM

# ------------------------------------------------------------------------------
# NVMe OPTIMIZATIONS (Write Throughput focus)
# ------------------------------------------------------------------------------
# random_page_cost:
# default is 4.0 (HDD), 1.1 implies random seek is almost as fast as seq scan.
random_page_cost = 1.1

# synchronous_commit:
# OFF means transaction returns success before headers hit disk.
# RISK: Small data loss on OS crash (few milliseconds).
# GAIN: Massive write throughput boost for high-frequency sensor data.
synchronous_commit = off

# wal_writer_delay:
# Slight increase for batching commits
wal_writer_delay = 200ms

# ------------------------------------------------------------------------------
# TIMESCALEDB SPECIALS
# ------------------------------------------------------------------------------
# Preload the library (Required)
shared_preload_libraries = 'timescaledb'
