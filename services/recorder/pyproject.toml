[project]
name = "silvasonic-recorder"
version = "0.1.0"
description = "Silvasonic Recorder Service"
requires-python = ">=3.11"
dependencies = [
    "silvasonic-core",
    "psutil>=5.9.0",


    "structlog>=23.0.0",
    "ffmpeg-python>=0.2.0",
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
