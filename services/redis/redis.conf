# Redis Configuration for Silvasonic
# Role: Ephemeral Message Broker & Cache

# ------------------------------------------------------------------------------
# NETWORK
# ------------------------------------------------------------------------------
# Bind to all interfaces (Container restriction handles security)
bind 0.0.0.0
port 6379

# Disable Protected Mode because we are in a container network
# and we explicitly want other containers to connect.
protected-mode no

# ------------------------------------------------------------------------------
# PERSISTENCE (Ephemeral Mode)
# ------------------------------------------------------------------------------
# We do NOT want persistence. Redis is for real-time state and messaging.
# If the container restarts, we want a clean slate.
save ""
appendonly no

# ------------------------------------------------------------------------------
# MEMORY MANAGEMENT
# ------------------------------------------------------------------------------
# Max memory limit (Safety against leaks)
maxmemory 64mb
# Eviction policy: Drop oldest keys if full
maxmemory-policy allkeys-lru

# ------------------------------------------------------------------------------
# LOGGING
# ------------------------------------------------------------------------------
loglevel notice
