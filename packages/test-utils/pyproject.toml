[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "silvasonic-test-utils"
dynamic = ["version"]
description = "Shared testcontainer fixtures for Silvasonic integration tests"
requires-python = ">=3.13"
keywords = ["silvasonic", "test", "fixtures", "testcontainers"]
classifiers = []
dependencies = ["pytest>=8.3.0", "testcontainers>=4.14.1", "silvasonic-core"]

[tool.hatch.version]
path = "../../packages/core/src/silvasonic/core/__init__.py"

[tool.hatch.build.targets.wheel]
packages = ["src/silvasonic"]
