---
repos:
  - repo: local
    hooks:
      # 1. FIX: Formatierung & Autofix (Läuft nur auf Git-Index)
      - id: fix-local
        name: Fix (Format & Lint)
        entry: just fix
        language: system
        pass_filenames: true
        types_or: [python, pyi]
        verbose: true
        stages: [pre-commit]

      # 2. CHECK: Fast Check (Lint, Types, Unit Tests) - Runs on Commit
      - id: check-local
        name: Check (Lint, Types, Unit)
        entry: just check
        language: system
        pass_filenames: false
        always_run: true
        verbose: true
        stages: [pre-commit]

      # 3. VERIFY: Full Lokal-Check inkl. DB-Integration - Runs on Push
      - id: verify-local
        name: Verify (Lint, Types, Unit, Int)
        entry: just v
        language: system
        pass_filenames: false
        always_run: true
        verbose: true
        stages: [pre-push]
