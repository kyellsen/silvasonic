---
repos:
  - repo: local
    hooks:
      # 1. FIX: Formatierung & Autofix (Läuft vor Commit & Push)
      - id: fix-local
        name: Fix (Format & Lint)
        entry: uv run scripts/fix.py
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-commit, pre-push]

      # 2. UNIT TESTS: Schnelle Tests (Läuft vor Commit & Push)
      - id: test-unit
        name: Unit Tests
        entry: uv run scripts/test_unit.py
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-commit, pre-push]

      # 3. CHECK: Strikte Tests (Integration) & Checks (Läuft nur vor Push)
      - id: check-local
        name: Check (Deep Verification & Integration)
        entry: uv run scripts/check.py
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
