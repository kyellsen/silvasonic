---
site_name: Silvasonic
site_description: Bioacoustic Monitoring System Documentation
site_author: Silvasonic Team
repo_url: https://github.com/yourusername/silvasonic
edit_uri: edit/main/docs/
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
  palette:
    # Light mode
    - scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
nav:
  - Home: index.md
  - Architecture: [architecture/]
  - Services:
      - Template Service: services/template.md
  - ADRs: [adr/]
  - Development: [development/]
  - Deployment: [deployment/]
  - Hardware: hardware.md
  - Glossary: glossary.md
plugins: [search, include-markdown]
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true
